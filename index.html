<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ABS Cards">
<meta name="theme-color" content="#b23b3b">
<title>ABS Cards</title>
<style>
  :root { --red:#b23b3b; --bg:#f4f2ef; --card:#fff; --ink:#1a1a1a; --muted:#6b6b6b;
          --line:#e2ded9; --green:#2e7d4f; --amber:#c77d21;
          --safeT:env(safe-area-inset-top); --safeB:env(safe-area-inset-bottom); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; margin:0; overscroll-behavior:none; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
         display:flex; flex-direction:column; height:100dvh;
         padding:var(--safeT) 0 0 0; }
  header { padding:10px 16px 8px; text-align:center; flex:0 0 auto; }
  h1 { font-size:15px; margin:0; font-weight:700; }
  .bar { display:flex; gap:8px; align-items:center; padding:0 12px 8px; flex:0 0 auto; }
  select { flex:1; font:inherit; font-size:15px; border:1px solid var(--line); background:#fff;
           color:var(--ink); border-radius:12px; padding:11px 12px; -webkit-appearance:none; }
  .iconbtn { font:inherit; font-size:14px; border:1px solid var(--line); background:#fff;
             border-radius:12px; padding:11px 13px; color:var(--ink); }
  .stats { display:flex; gap:16px; justify-content:center; font-size:13px; color:var(--muted);
           padding:0 12px 8px; flex:0 0 auto; }
  .stats b { color:var(--ink); }
  .stage { flex:1 1 auto; position:relative; padding:0 12px; min-height:0; }
  .card { position:absolute; inset:0 12px; background:var(--card); border:1px solid var(--line);
          border-radius:22px; padding:24px 20px; box-shadow:0 4px 20px rgba(0,0,0,.06);
          display:flex; flex-direction:column; overflow-y:auto; -webkit-overflow-scrolling:touch;
          user-select:none; }
  .topic { font-size:11px; text-transform:uppercase; letter-spacing:1.3px; color:var(--red);
           font-weight:700; margin-bottom:14px; flex:0 0 auto; }
  .q { font-size:21px; font-weight:600; line-height:1.45; }
  .divider { border:none; border-top:1.5px solid var(--line); margin:18px 0 14px; }
  .a { font-size:19px; line-height:1.55; color:#2a2a2a; }
  .hint { margin-top:auto; padding-top:18px; text-align:center; color:var(--muted); font-size:13px; flex:0 0 auto; }
  .hidden { display:none !important; }
  .counter { text-align:center; font-size:13px; color:var(--muted); padding:8px 0 4px; flex:0 0 auto; }
  .actions { flex:0 0 auto; display:flex; gap:10px; padding:6px 12px calc(12px + var(--safeB)); }
  .actions button { flex:1; font:inherit; font-size:17px; font-weight:600; border-radius:14px;
                    padding:15px 10px; border:1.5px solid var(--line); background:#fff; color:var(--ink); }
  .reveal { background:var(--red); color:#fff; border-color:var(--red); }
  .again { border-color:var(--amber); color:var(--amber); }
  .know { border-color:var(--green); color:var(--green); }
  button:active { transform:scale(.98); }
  .done { position:absolute; inset:0 12px; display:flex; flex-direction:column; align-items:center;
          justify-content:center; text-align:center; gap:14px; }
  .done h2 { color:var(--green); margin:0; }
  .done p { color:var(--muted); margin:0; }
  .done button { font:inherit; font-size:17px; font-weight:600; background:var(--red); color:#fff;
                 border:none; border-radius:14px; padding:14px 24px; }
</style>
</head>
<body>
<header><h1>ABS Qualifying Exam — Flashcards</h1></header>
<div class="bar">
  <select id="topic"></select>
  <button class="iconbtn" id="dueBtn">All</button>
  <button class="iconbtn" id="shuffle">🔀</button>
</div>
<div class="stats" id="stats"></div>

<div class="stage">
  <div class="card" id="card">
    <div class="topic" id="c-topic"></div>
    <div class="q" id="c-q"></div>
    <div id="answerBlock" class="hidden">
      <hr class="divider"><div class="a" id="c-a"></div>
    </div>
    <div class="hint" id="hint">Tap card to reveal · swipe to move</div>
  </div>
  <div class="done hidden" id="done">
    <h2>Deck complete 🎉</h2>
    <p>You've gone through every card in this filter.</p>
    <button id="restart">Start over</button>
  </div>
</div>

<div class="counter" id="counter"></div>
<div class="actions" id="frontActions">
  <button class="reveal" id="revealBtn">Show answer</button>
</div>
<div class="actions hidden" id="gradeActions">
  <button class="again" id="againBtn">Need review</button>
  <button class="know" id="knowBtn">Got it</button>
</div>

<script>
const CARDS = [{"topic": "Breast", "q": "What is the CHEK2 gene and what cancers does its mutation predispose to?", "a": "A serine/threonine kinase involved in DNA damage repair and apoptosis. Mutation increases breast, colorectal, and bladder cancer risk, plus male breast cancer (with BRCA2)."}, {"topic": "Breast", "q": "What fraction of male breast cancer is attributable to BRCA2, and what is the lifetime breast cancer risk it confers in men?", "a": "BRCA2 accounts for ~40% of male breast cancer; lifetime risk ~7% (80–100x the normal male population)."}, {"topic": "Breast", "q": "BRCA1 in male breast cancer: what risk and what % of cases?", "a": "Lifetime risk ~1%; accounts for ~4% of male breast cancer cases."}, {"topic": "Breast", "q": "What % of breast cancer is due to BRCA1/2 mutations, and what is the lifetime breast cancer risk in carriers?", "a": "5–10% of breast cancer incidence; lifetime breast cancer risk 37–85%."}, {"topic": "Breast", "q": "Ovarian cancer lifetime risk in BRCA1 vs BRCA2 carriers?", "a": "BRCA1: 16–63%. BRCA2: 10–27%."}, {"topic": "Breast", "q": "Receptor profile typical of BRCA1-associated breast cancers?", "a": "Lower ER/PR expression, rarely HER2 overexpression — many are triple negative."}, {"topic": "Breast", "q": "Treatments contraindicated for breast cancer during pregnancy?", "a": "Anti-HER2 therapy, tamoxifen, methotrexate, bisphosphonates, methylene blue dye (SLNB), and radiation therapy."}, {"topic": "Breast", "q": "Per NCCN, surgical options for clinically node-negative breast cancer in 2nd/early 3rd trimester?", "a": "(1) Mastectomy + axillary staging → adjuvant chemo, postpartum endocrine/targeted; (2) BCS + axillary staging → adjuvant chemo, postpartum radiation + endocrine/targeted; (3) Neoadjuvant chemo → mastectomy or BCS + axillary staging → postpartum radiation (if BCS) + endocrine/targeted. MRM is no longer the only option."}, {"topic": "Breast", "q": "What factors are used in the Gail Model?", "a": "Age, age of menarche, age at first pregnancy/nulliparity, first-degree relative with breast cancer, number of prior breast biopsies, number of biopsies with atypical hyperplasia, and race/ethnicity."}, {"topic": "Breast", "q": "In which populations may the Gail Model underestimate risk, and in whom is it not valid?", "a": "May underestimate in Black/African American and Hispanic women born outside the US. Not accurate in BRCA carriers or those with prior invasive/in situ (lobular or ductal) breast cancer; DCIS patients weren't in the original cohort."}, {"topic": "Breast", "q": "What is Mondor disease and is it usually primary or secondary?", "a": "Superficial thrombophlebitis of the breast/chest wall veins. Most cases are primary (idiopathic); secondary cases are due to an underlying disease."}, {"topic": "Breast", "q": "What is DCIS and its most common presentation?", "a": "A premalignant, noninvasive breast cancer with malignant epithelial cells confined within the ductal-lobular basement membrane. Most frequent presentation: clustered microcalcifications on mammogram."}, {"topic": "Breast", "q": "What is the adequate DCIS margin, and management if disease is within 1 mm but not at the margin?", "a": "2 mm from ink. If within 1 mm but not involving the margin, individualize — re-excision is usually advised."}, {"topic": "Breast", "q": "What does the 21-gene assay (Oncotype DX) predict and in whom?", "a": "Predicts benefit of adding adjuvant chemo to endocrine therapy in HR-positive, HER2-negative, node-negative tumors. RS 0–10: no benefit from chemo; RS ≥26: clear benefit."}, {"topic": "Breast", "q": "TAILORx and RxPONDER — what did each establish?", "a": "TAILORx: genomic testing can eliminate chemo in low recurrence score, low-risk HR-positive women. RxPONDER: postmenopausal node-positive women with Oncotype <25 derive no benefit from chemo."}, {"topic": "Breast", "q": "Why is tamoxifen preferred over aromatase inhibitors in men with HR-positive breast cancer?", "a": "In men 80% of estrogen comes from aromatase and 20% from testes; AIs raise FSH/testosterone, increasing aromatization. Tamoxifen avoids this and has proven benefit."}, {"topic": "Breast", "q": "Per Choosing Wisely (2016), when can SLNB be omitted in breast cancer?", "a": "In clinically node-negative patients ≥70 with early-stage HR-positive, HER2-negative invasive cancer."}, {"topic": "Breast", "q": "Optimal duration of extended endocrine therapy — tamoxifen and aromatase inhibitor?", "a": "Tamoxifen can be extended to 10 years. For AIs, current recommendation is an additional 2 years (total 7) — SALSA trial showed 10 total years increased fracture/osteoporosis without survival benefit."}, {"topic": "Breast", "q": "What does the Breast Cancer Index (BCI) predict?", "a": "Benefit of extended endocrine therapy — high BCI predicts ~10% improvement in DFS and OS with extension."}, {"topic": "Breast", "q": "pCR rates: neoadjuvant trastuzumab alone vs trastuzumab + pertuzumab?", "a": "Trastuzumab alone ~30%; adding pertuzumab ~45%. Both HER2 agents are current standard of care."}, {"topic": "Breast", "q": "Cardiotoxicity risk: doxorubicin alone, trastuzumab alone, and combined?", "a": "Doxorubicin alone ~9%; trastuzumab alone ~8%; combined ~30% show long-term EF decline. Risk = EF drop >10% within first year."}, {"topic": "Breast", "q": "Management if EF drops during trastuzumab therapy?", "a": "Hold HER2-directed therapy (continue rest of regimen), refer to cardio-oncology; ACE inhibitors may aid recovery. EF usually recovers and patients can be rechallenged."}, {"topic": "Breast", "q": "Intraductal papilloma with atypia on core needle biopsy — next step and why?", "a": "Excisional biopsy — ~10% risk of upstaging to low-grade cancer."}, {"topic": "Breast", "q": "When can breast MRI screening begin for high-risk patients (lifetime risk >20%)?", "a": "Age 25, using IV gadolinium."}, {"topic": "Breast", "q": "What is an animation deformity and how does prepectoral implant placement help?", "a": "Implant movement with pectoral muscle activity (subpectoral placement). Prepectoral placement has much lower animation deformity and less capsular contracture with radiation (still needs acellular dermal matrix)."}, {"topic": "Breast", "q": "What is targeted axillary dissection (TAD)?", "a": "SLNB combined with localizing/removing the previously biopsied and clipped positive node after neoadjuvant therapy — reduces false-negative rate vs SLNB alone, less lymphedema than ALND."}, {"topic": "Breast", "q": "Low-dose tamoxifen for DCIS — what did the TAM-01 trial show?", "a": "5 mg daily reduced invasive cancer events at 3 years with far fewer side effects; endometrial cancer/clotting incidence negligible and similar to placebo."}, {"topic": "Endocrine", "q": "CDH1 mutation is associated with what syndrome and cancers?", "a": "Hereditary diffuse gastric cancer (autosomal dominant) — signet ring cell adenocarcinoma and lobular breast carcinoma at young ages. Average age of gastric cancer diagnosis is 38."}, {"topic": "Endocrine", "q": "When should CDH1 genetic testing be considered (HDGC criteria)?", "a": "(1) 2 gastric cancers in family, 1 confirmed DGC before 50; (2) 3 confirmed DGC in 1st/2nd-degree relatives any age; (3) DGC before 40 with family hx; (4) personal/family hx of DGC and lobular breast cancer before 50."}, {"topic": "Endocrine", "q": "What is Conn syndrome and its lab pattern?", "a": "Primary hyperaldosteronism — refractory HTN, peripheral edema, hypokalemia symptoms. Labs: low serum K+, high urinary K+, low urinary Na+ (though most patients are normokalemic)."}, {"topic": "Endocrine", "q": "First step and confirmatory test for suspected hyperaldosteronism?", "a": "Measure aldosterone-to-renin ratio (>30 suggestive). Confirm with aldosterone suppression testing (saline infusion or 24-hr urine aldosterone on high-sodium diet). Must withhold mineralocorticoids 6 weeks."}, {"topic": "Endocrine", "q": "What % of medullary thyroid cancer is germline, and what testing is advised?", "a": "~25% germline. All MTC patients undergo genetic testing for MEN 2A/2B."}, {"topic": "Endocrine", "q": "Timing of thyroidectomy in MEN 2A: high-risk vs moderate-risk mutation?", "a": "High-risk: total thyroidectomy by age 5. Moderate-risk: annual surveillance (neck exam, US, calcitonin); can often delay thyroidectomy to late childhood/early adulthood."}, {"topic": "Endocrine", "q": "Operative approach and markers for MTC?", "a": "Total thyroidectomy with central node dissection. MTC secretes calcitonin and CEA. Preop calcitonin >500 pg/mL warrants evaluation for distant metastasis."}, {"topic": "Endocrine", "q": "Typical ectopic locations of superior vs inferior parathyroid glands?", "a": "Superior: tracheoesophageal groove, carotid sheath, intrathyroidal. Inferior: thymus, perithymic fat, thyrothymic ligament. Inferior more commonly ectopic (longer descent). ~25% of patients have ectopic glands."}, {"topic": "Endocrine", "q": "Preoperative management of pheochromocytoma/paraganglioma (PPGL)?", "a": "Alpha-blockade first (phenoxybenzamine or selective alpha-1) started 7–14 days preop, then beta-blockade once alpha-blocked. Never beta-block before alpha-block (risk of hypertensive crisis). Add high-sodium diet/volume expansion."}, {"topic": "Endocrine", "q": "Why do PPGL patients become hypotensive after adrenal vein ligation/resection?", "a": "Abrupt drop in circulating catecholamines plus ongoing alpha-blockade and pre-existing volume contraction. Stop all alpha-blockers/vasodilators; may need pressors and ICU."}, {"topic": "Endocrine", "q": "Incidence of diabetes in pheochromocytoma and what happens after resection?", "a": "~35% have diabetes (catecholamines suppress insulin, increase resistance). After resection, rebound insulin secretion can cause hypoglycemia."}, {"topic": "Endocrine", "q": "Defines a benign adrenal mass on noncontrast CT?", "a": "Macroscopic fat (myelolipoma) or microscopic fat = Hounsfield units ≤10. HU >20 should prompt workup for pheochromocytoma, metastasis, adrenocortical carcinoma."}, {"topic": "Endocrine", "q": "Adrenal adenoma washout criteria?", "a": "Absolute washout ≥60% (needs noncontrast HU) or relative washout ≥40% indicates adenoma. Adenomas wash out rapidly; metastases have delayed washout."}, {"topic": "Endocrine", "q": "Most common malignant adrenal masses?", "a": "Metastases — most commonly from melanoma, sarcoma, lung, renal cell, breast, and colorectal cancer. Adrenocortical cancer is rare. Adrenal nodules occur in 3–7% of adults."}, {"topic": "Endocrine", "q": "What is MACS (mild autonomous cortisol secretion) and its diagnostic threshold?", "a": "Most common hormonal abnormality in adrenal incidentalomas. Abnormal 1-mg dexamethasone suppression test (cortisol 1.8–5 µg/dL) without physical stigmata of Cushing. AAES recommends minimally invasive adrenalectomy."}, {"topic": "Endocrine", "q": "Preferred glucocorticoid replacement after surgery for Cushing syndrome and why?", "a": "Hydrocortisone — moderate half-life that best matches the body's natural diurnal cortisol release. Prednisone/dexamethasone have longer half-lives and risk overtreatment."}, {"topic": "Endocrine", "q": "When are mineralocorticoids (fludrocortisone) needed after adrenalectomy?", "a": "Not needed after unilateral adrenalectomy; required after total bilateral adrenalectomy (with hydrocortisone) due to absent aldosterone."}, {"topic": "Endocrine", "q": "FNA size threshold for thyroid nodules and how ATA vs ACR TI-RADS differ?", "a": "FNA threshold 10–15 mm. ATA is pattern-based; ACR TI-RADS assigns additive points for features. High-risk features: solid, hypoechoic, irregular borders, punctate echogenic foci."}, {"topic": "Endocrine", "q": "Management options for Bethesda III thyroid cytology?", "a": "Repeat FNA with molecular testing, diagnostic lobectomy (esp. suspicious features), or continued monitoring."}, {"topic": "Endocrine", "q": "Which RAS variant carries the highest thyroid malignancy risk alone?", "a": "HRAS > NRAS > KRAS. Thyroid lobectomy should be considered for a RAS variant to establish diagnosis."}, {"topic": "Endocrine", "q": "How to minimize thyroid storm risk before thyroidectomy?", "a": "Normalize T4/T3 preop (titrate methimazole); patient clinically asymptomatic. If urgent, use steroids and continue beta-blockers (propranolol also blocks T4→T3 conversion)."}, {"topic": "Endocrine", "q": "Timeline for evaluating RLN/EBSLN injury after thyroid surgery?", "a": "Assess voice changes 2 weeks–2 months postop with direct laryngoscopy. RLN injury: asymmetric cord motion (affected cord lateralized). Consider injection laryngoplasty (temporary)."}, {"topic": "Endocrine", "q": "When can tertiary hyperparathyroidism (THPT) be reliably diagnosed after kidney transplant?", "a": "At least 6 months after transplant — PTH normalizes over 3–6 months, calcium normalizes by 6–8 months."}, {"topic": "Endocrine", "q": "Most likely cause of persistently high PTH with normocalcemia 6 months after parathyroidectomy?", "a": "Vitamin D deficiency (evaluate secondary causes first: vitamin D, renal function, bone mineral density)."}, {"topic": "Endocrine", "q": "Total body calcium stores and distribution?", "a": "~1000 g, with ~99% in bone. Normal daily calcium intake 500–1500 mg."}, {"topic": "Endocrine", "q": "Effect of respiratory alkalosis on ionized calcium?", "a": "Increases calcium binding affinity for albumin, reducing serum ionized calcium."}, {"topic": "Colorectal", "q": "Colonic lipoma — location, endoscopic sign, and when to remove?", "a": "Right colon, ages 50–60; normal mucosa over adipose; 'pillow/cushion sign' when probed. Remove if >2 cm or symptomatic (bleeding, diarrhea, intussusception, obstruction) via snare or segmental colectomy."}, {"topic": "Colorectal", "q": "Workup of squamous cell anal canal cancer per NCCN?", "a": "DRE, inguinal node eval ± FNA/biopsy, CT chest/abdomen + CT/MRI pelvis, anoscopy, HIV testing, gyn exam (women). Primary treatment (locoregional): mitomycin/5-FU + radiation (or mitomycin/capecitabine, or 5-FU/cisplatin + radiation)."}, {"topic": "Colorectal", "q": "Define a complex anal fistula.", "a": "Involves >30–40% of sphincter complex, anterior in women, multiple/recurrent, or in patients with incontinence, pelvic irradiation, or Crohn disease. Treat with draining seton first."}, {"topic": "Colorectal", "q": "Sphincter-sparing options after seton maturation of a fistula?", "a": "LIFT (ligation of intersphincteric fistula tract), fibrin glue, bioprosthetic plug, or endorectal advancement flap."}, {"topic": "Colorectal", "q": "Goodsall's rule?", "a": "Anterior fistulae run directly (radially) into the anal canal; posterior fistulae take a curved course to the posterior midline. Exception: openings >3 cm away tend to track posteriorly."}, {"topic": "Colorectal", "q": "Best surgical result for slow-transit constipation?", "a": "Subtotal colectomy with ileorectal anastomosis (median stool frequency ~3/day). Warn about persistent bloating/discomfort."}, {"topic": "Colorectal", "q": "Rectal prolapse — sex ratio, and abdominal vs perineal approach?", "a": "6:1 female predominance, women >70. Abdominal approach: better outcomes. Perineal: less morbidity, reserved for older/high-risk. Ripstein is a common abdominal repair; main complication is constipation, worst is mesh infection/erosion."}, {"topic": "Colorectal", "q": "ASCRS-recommended definitive repair for rectal prolapse in acceptable-risk patients?", "a": "Transabdominal rectal fixation (rectopexy to sacral promontory), ± resection of redundant rectosigmoid. Mesh sling no longer advocated. Altemeier (perineal rectosigmoidectomy) for high-risk: lower complications, higher recurrence."}, {"topic": "Colorectal", "q": "Colonic volvulus — distribution by site?", "a": "Sigmoid ~2/3 of cases, cecal ~1/4, transverse very rare. High-fiber diets predispose (volvulus belt: Africa, Asia)."}, {"topic": "Colorectal", "q": "First-line treatment for CDI and the advantage of fidaxomicin?", "a": "Fidaxomicin is now recommended for initial nonsevere and severe CDI (narrow spectrum, rare resistance, fewer recurrences); oral vancomycin is acceptable alternative. Vancomycin remains recommended for fulminant disease."}, {"topic": "Colorectal", "q": "When is fecal microbiota transplant (FMT) recommended for CDI?", "a": "Multiple recurrent CDI episodes (typically ≥3, data emerging for ≥2) and secondary prophylaxis in high-risk patients. Response rates ~90%."}, {"topic": "Colorectal", "q": "Define recurrent CDI and its rate.", "a": "Recurrence of diarrhea + positive tests within 8 weeks of initial treatment. Rate ~20%, higher with subsequent recurrences."}, {"topic": "Colorectal", "q": "Endoluminal vacuum-assisted therapy for anastomotic leaks — indication and success rate?", "a": "For low colorectal/anal anastomotic leaks in hemodynamically normal patients without peritonitis/sepsis. Success 60–100%. Endoscopic clipping best for small leaks."}, {"topic": "Colorectal", "q": "What did the 2014/2023 Cochrane reviews show about bowel prep + antibiotics for colorectal surgery?", "a": "Mechanical bowel prep with BOTH oral and IV antibiotics reduced SSI by ≥40% vs IV alone, reducing organ space infection and anastomotic leak. This is the guideline recommendation."}, {"topic": "Colorectal", "q": "Bevacizumab mechanism and perforation risk/timing for surgery?", "a": "Anti-VEGF monoclonal antibody. ~80% increased perforation risk within 6 months (colon > small bowel > stomach). Half-life 20 days; wait ≥6 weeks before surgery, don't restart for ≥4 weeks postop."}, {"topic": "HPB", "q": "Benefits of HIPEC?", "a": "High local chemotherapy concentration delivered directly to tumor (not dependent on blood supply); hyperthermia enhances cytotoxicity; high local doses with diffusion into nodules while minimizing systemic toxicity."}, {"topic": "HPB", "q": "HIPEC agents: US vs Europe?", "a": "US: mitomycin. Europe: oxaliplatin. Irinotecan (with 5-FU/leucovorin) used for metastatic pancreatic adenocarcinoma."}, {"topic": "HPB", "q": "Pancreas divisum — embryology and imaging of choice?", "a": "In ~10%, ventral and dorsal ducts fail to fuse. Dorsal duct (Santorini) → minor papilla drains majority; ventral duct (Wirsung) → major papilla. Secretin-enhanced MRCP is imaging of choice (sensitivity 86%, 73% with chronic pancreatitis)."}, {"topic": "HPB", "q": "Diagnostic criteria for SBP?", "a": "Ascites + PMN count >250/µL (most accurate predictor), regardless of culture (only 35–65% culture-positive). Single organism usually; most common E. coli (~40–50%)."}, {"topic": "HPB", "q": "Antibiotic management of SBP: community vs hospital-acquired?", "a": "Community-acquired: 3rd-gen cephalosporin or pip/tazo. Hospital-acquired: carbapenem ± daptomycin (anti-MRSA) if high MDRO prevalence."}, {"topic": "HPB", "q": "3 most common SBP organisms?", "a": "E. coli, Klebsiella pneumoniae, pneumococci. If multiple organisms — question the diagnosis and search for secondary peritonitis (perforated viscus)."}, {"topic": "HPB", "q": "Hallmark of chronic pancreatitis and most common indication for surgery?", "a": "Intractable epigastric pain radiating to back/flank; progressive fibrosis, calcification, ductal dilation. Pain is the most common operative indication."}, {"topic": "HPB", "q": "ISGPF postoperative pancreatic fistula grading?", "a": "All require drain amylase >3x serum upper limit on POD3+. Biochemical leak: no clinical implications. Grade B: clinical implications. Grade C: reoperation/organ failure. Grade D: death."}, {"topic": "HPB", "q": "Atlanta Criteria for acute pancreatitis diagnosis and severity?", "a": "Diagnosis: 2 of 3 — epigastric pain, elevated amylase/lipase, imaging findings. Severity: mild (local complications, no organ failure), moderate (organ failure <48 h), severe (organ failure >48 h)."}, {"topic": "HPB", "q": "Initial therapy for acute pancreatitis?", "a": "Fluid resuscitation within 24 h, enteral nutrition within 48 h, pain control. Antibiotics not routine without infected collection. Routine preop ERCP not recommended in biliary pancreatitis (choledocholithiasis in only ~25%)."}, {"topic": "HPB", "q": "Timing of cholecystectomy for mild vs moderate/severe gallstone pancreatitis?", "a": "Mild: same admission (early recurrence up to 30%). Moderate/severe: interval cholecystectomy after 6 weeks."}, {"topic": "HPB", "q": "WATERFALL trial finding on fluid resuscitation in mild pancreatitis?", "a": "Aggressive resuscitation (20 mL/kg bolus + 3 mL/kg/hr) caused significantly more volume overload and trends toward worse outcomes vs moderate resuscitation. Stopped early."}, {"topic": "HPB", "q": "Milan Criteria for liver transplant in HCC?", "a": "Solitary tumor ≤5 cm OR up to 3 lesions ≤3 cm each, no extrahepatic spread or vascular invasion."}, {"topic": "HPB", "q": "UCSF Criteria for HCC transplant?", "a": "1 lesion ≤6.5 cm OR up to 3 lesions ≤4.5 cm with total diameter ≤8 cm."}, {"topic": "HPB", "q": "Laparoscopic liver resection — best and worst segments?", "a": "Best: peripheral segments II, III, IVb, V, VI (segment VI ideal). Relative contraindication: segment VIII (deep, posterior, near diaphragm/hepatic veins)."}, {"topic": "HPB", "q": "Hepatocellular adenoma — when to resect?", "a": "Tumor >5 cm with no regression after lifestyle changes (stop OCPs, weight loss). HNF1A-inactivated (H-HCA) is ~half of adenomas, common in hepatic adenomatosis. Transplant reserved for extensive disease with high malignant potential."}, {"topic": "HPB", "q": "Definition of hepatic adenomatosis?", "a": "≥10 hepatocellular adenomas. More common in women; associated with glycogen storage disease, HNF1A inactivation, MODY. Most have H-HCA (low malignant risk)."}, {"topic": "HPB", "q": "Polycystic liver disease — definition and transplant criteria?", "a": "≥10 liver cysts, often with polycystic kidney disease; >90% asymptomatic, rarely causes liver dysfunction. Transplant for massive cystic replacement (7 of 8 segments), severe malnutrition, extreme QoL disruption."}, {"topic": "HPB", "q": "Echinococcal (hydatid) cyst — diagnosis and confirmatory test?", "a": "Suspect in endemic-area travelers (East Asia, Central/South America). US shows internal debris/daughter cysts; MRI preferred over CT. Confirm with ELISA for Echinococcus antigen BEFORE any aspiration."}, {"topic": "HPB", "q": "Todani classification of choledochal cysts and treatments?", "a": "Type I (90%, entire CBD): resection + hepaticojejunostomy. Type II (2%, diverticulum): diverticulectomy. Type III (choledochocele): endoscopic sphincterotomy. Type IV (intra/extrahepatic): may need liver resection. Type V (intrahepatic only): resection/transplant."}, {"topic": "HPB", "q": "Most common cause of postcholecystectomy biliary stricture and evaluation?", "a": "Inadvertent energy injury or clip placement. Painless jaundice ± cholangitis, elevated bilirubin/alk phos. US/CT first; ERCP is standard of care; MRCP defines location without invasion."}, {"topic": "HPB", "q": "MRCP features of malignant vs benign biliary stricture?", "a": "Malignant: irregular, asymmetric, shouldered margin, enhancement. Benign: nonenhancing, smooth, symmetric, gradual taper over longer distance."}, {"topic": "HPB", "q": "First-line treatment of benign biliary strictures and most durable endoscopic option?", "a": "Endoscopic therapy first-line. Fully covered self-expanding metal stent is the most durable. Open (Roux-en-Y hepaticojejunostomy) if endoscopy fails."}, {"topic": "HPB", "q": "ERCP perforation rate and classification management?", "a": "~0.1% baseline, ~1.5% with sphincterotomy. Type I (large, lateral/medial wall): usually surgery. Type II/III (smaller, periampullary/ductal): often self-limited, ~62% seal without surgery."}, {"topic": "HPB", "q": "Cholecystectomy in cirrhosis — which Child class is contraindicated?", "a": "Child A/B should undergo cholecystectomy despite higher risk. Child C is a contraindication (prohibitive morbidity/mortality). Cirrhosis confers ~10x gallstone risk."}, {"topic": "HPB", "q": "Kasai procedure for biliary atresia — timing and key surgical factor?", "a": "Roux-en-Y hepatic portoenterostomy ideally before 60 days of life. Wide, meticulous porta hepatis dissection (exposing microscopic ductules) is the single most critical factor for bile flow."}, {"topic": "HPB", "q": "Regulation of pancreatic exocrine secretion?", "a": "Stimulated by secretin (released by duodenal acid), CCK (released by fat/protein digestion products), and vagal parasympathetic discharge. Inhibited by pancreatic polypeptide, somatostatin, glucagon."}, {"topic": "HPB", "q": "Key ERCP anatomy: bile duct vs pancreatic duct orientation at the papilla?", "a": "Bile duct joins at 11–1 o'clock (parallel, cephalad); pancreatic duct at 1–3 o'clock (perpendicular). Biliary sphincterotomy cuts 11–1 o'clock. Side-viewing endoscope used."}, {"topic": "Foregut", "q": "Standard of care for symptomatic achalasia — key operative principle?", "a": "Surgical esophagomyotomy: complete 6–8 cm myotomy (4–6 cm onto esophagus, 2–3 cm onto stomach). Longitudinal muscle first, then circular. Failure to divide all LES layers → recurrence. Add Dor/Toupet fundoplication."}, {"topic": "Foregut", "q": "What causes esophageal stricture and what % is due to GERD?", "a": "Chronic inflammation → fibrosis. GERD accounts for ~70–80% of esophageal strictures; strictures occur in 7–23% of untreated reflux patients."}, {"topic": "Foregut", "q": "Hiatal hernia types and prevalence?", "a": ">50% of patients over 50 have a hiatal hernia; overwhelming majority are sliding (type I). Paraesophageal (type II) ~5%. Most are asymptomatic and need no correction."}, {"topic": "Foregut", "q": "Indications to repair hiatal hernia?", "a": "Type I: inadequate reflux control. Type II: symptomatic. Or asymptomatic healthy patient with a large portion of stomach herniated into chest. Mesh doesn't reduce recurrence vs tension-free suture repair alone."}, {"topic": "Foregut", "q": "Giant paraesophageal hernia — definition and repair indications?", "a": ">50% of stomach in chest. Elective repair reserved for inadequate reflux control or respiratory compromise. Urgent for obstruction/gastric volvulus. Gastropexy + G-tube for frail patients."}, {"topic": "Foregut", "q": "Caustic injury grading on endoscopy (within 24 h)?", "a": "Grade I: erythema/edema/superficial erosions. Grade II: circumferential ulceration or hemorrhage. Grade III: deep/extensive ulceration, coagulative necrosis or perforation. Repeat endoscopy 2–5 days for grade II/III."}, {"topic": "Foregut", "q": "SMA syndrome — cause and most common operation?", "a": "Compression of 3rd portion of duodenum between SMA and aorta/vertebral column. Postprandial pain, vomiting, weight loss. Conservative for acute; duodenojejunostomy is the most common operation for chronic/severe cases."}, {"topic": "Foregut", "q": "Postvagotomy diarrhea — treatment?", "a": "Diagnosis of exclusion. Supportive with cholestyramine (bile acid sequestration). Refractory: interpose a 10-cm reversed (antiperistaltic) jejunal segment ~100 cm distal to ligament of Treitz."}, {"topic": "Bariatric", "q": "Slipped gastric band — appearance and management?", "a": "Fundus herniates through band; band lies horizontally ('twenty past ten') instead of ~45°. Can incarcerate/become necrotic — surgical emergency. If hemodynamically compromised, urgent OR to remove band and resect ischemic stomach."}, {"topic": "Bariatric", "q": "Gastric/esophageal dilation after band placement — Phi angle and treatment?", "a": "Normal Phi angle ~45° (25–75°). Progressive dysphagia with normal Phi angle = gastric constriction by band. Treat with band deflation for months, then incremental reinflation. Balloon dilation not recommended."}, {"topic": "Bariatric", "q": "Marginal ulcer after gastric bypass — location, incidence, treatment?", "a": "Near the gastrojejunal anastomosis, up to 10% of RYGB. First-line medical: open-capsule PPI, sucralfate + misoprostol ≥90 days, stop smoking/NSAIDs."}, {"topic": "Bariatric", "q": "Most common reason for conversion of sleeve gastrectomy to gastric bypass?", "a": "GERD — up to 1 in 3 sleeve patients develop new/worsening GERD."}, {"topic": "Bariatric", "q": "Bariatric surgery and PCOS/fertility — key counseling points?", "a": "Women with obesity + PCOS have 70–80% infertility risk. ~85% resume regular menses within 1 year of gastric bypass. Use reversible long-term contraception (IUD/implant); delay childbearing ≥1 year (2 years for band)."}, {"topic": "Hernia", "q": "Lichtenstein mesh sizing to reduce recurrence?", "a": "7 × 15 cm mesh extending 2 cm medial to pubic tubercle, 3–4 cm above Hesselbach triangle, 5–6 cm lateral to internal ring."}, {"topic": "Hernia", "q": "Spigelian hernia — location and frequency?", "a": "1–2% of abdominal wall hernias. Along the 'spigelian belt,' a 6-cm band cephalad from the ASIS (semilunar line), where internal oblique and transversus abdominis run parallel."}, {"topic": "Hernia", "q": "Athletic pubalgia — best imaging and first-line treatment?", "a": "MRI (diagnoses rectus abdominis/conjoint tendon tears); dynamic US gaining popularity. First-line: nonoperative — NSAIDs, physical therapy ≥12 weeks, ± steroid injection."}, {"topic": "Hernia", "q": "Nerves at risk in inguinal surgery (neuropathic inguinodynia)?", "a": "Ilioinguinal (T12–L1), iliohypogastric (L1), genital branch of genitofemoral (L2). Femoral branch of genitofemoral supplies anterior thigh."}, {"topic": "Hernia", "q": "Prehabilitation weight loss before ventral hernia repair — evidence?", "a": "RCT: mandatory 7% weight loss before elective repair led to MORE urgent hernia repairs without reducing complications. Individualize weight-loss targets; don't use as sole criterion. Consider for BMI ≥40."}, {"topic": "Hernia", "q": "Umbilical hernia in children — natural history and repair timing?", "a": "Up to 80% close by age 3–5. Surveillance until school age unless symptoms. Earlier repair (2–5 y) if history of incarceration or another abdominal surgery. Proboscis size doesn't predict closure."}, {"topic": "Hernia", "q": "Define rectus diastasis (2024 European Hernia Society)?", "a": "Separation between rectus muscles of ≥2 cm."}, {"topic": "Hernia", "q": "Negative pressure wound therapy over closed incisions — evidence?", "a": "Systematic review of 57 RCTs (13,744 patients): 33% reduction in SSI vs standard dressings (high certainty). Distinct from open-wound NPWT."}, {"topic": "Pediatric", "q": "Congenital diaphragmatic hernia — ventilation goals?", "a": "Refer to tertiary center with iNO/ECMO. Standard neonatal resuscitation + NG tube. Goal: paO2 >60, paCO2 <60; pressure-cycled ventilator usually sufficient."}, {"topic": "Pediatric", "q": "Hepatoblastoma — key marker, age, and chemo?", "a": "Child with liver mass + markedly elevated AFP = hepatoblastoma until proven otherwise. Most common primary liver malignancy in children, usually within first 2 years. Platinum-based chemo. F+/V+ get neoadjuvant chemo."}, {"topic": "Pediatric", "q": "PRETEXT annotation factors?", "a": "V (hepatic venous), P (portal venous), E (extrahepatic contiguous), F (multifocality), R (rupture), C (caudate), N (lymph node), M (distant metastases)."}, {"topic": "Pediatric", "q": "Intussusception — preferred nonoperative reduction and success rate?", "a": "Pneumatic reduction under fluoroscopy (easier, quicker, less radiation, smaller perforations) — successful in 85–95%; recurs in 10–15% within 24–48 h. No maximum number of reductions. Barium no longer used."}, {"topic": "Pediatric", "q": "Biliary atresia — what is it and standard treatment?", "a": "Progressive fibroinflammatory cholangiopathy with obliteration of extrahepatic biliary tree. Kasai (Roux-en-Y hepatic portoenterostomy) before 60 days."}, {"topic": "Pediatric", "q": "Gastroschisis vs omphalocele — key distinction and management?", "a": "Gastroschisis: defect right of umbilical cord, NO covering membrane. Cover with warm gauze/bowel bag; reduce if bowel normal (sutureless umbilical cord flap) or use silastic silo for gradual reduction."}, {"topic": "Pediatric", "q": "What is vanishing gastroschisis?", "a": "Abdominal wall defect closing in utero + extensive small bowel atresia → short bowel syndrome. Widen the fascial defect and explore rather than reduce; don't place a silo before evaluating remaining bowel."}, {"topic": "Pediatric", "q": "Meckel diverticulum — rule of 2s and best diagnostic test?", "a": "Most common congenital GI anomaly (omphalomesenteric duct). ~2–3% prevalence, male predominance. Most common cause of painless lower GI bleeding in children. Technetium-99m scintigraphy (sensitivity 89.6%, specificity 97.1%); H2-blocker/PPI improves accuracy."}, {"topic": "Pediatric", "q": "Malrotation/midgut volvulus — imaging findings?", "a": "UGI: bird's beak, contrast fails to leave 2nd/3rd duodenum, abnormal ligament of Treitz. US: SMV anterior/left of SMA, whirlpool sign. Narrow mesentery + mobile cecum increases volvulus risk."}, {"topic": "Pediatric", "q": "Congenital hydrocele — when to observe?", "a": "Watchful waiting in first 12 months for communicating hydrocele (spontaneous resolution common, low hernia risk). More common on right, often bilateral."}, {"topic": "Pediatric", "q": "ASD closure timing in children?", "a": "Symptomatic patients: repair. Asymptomatic: closure typically 4–5 years to prevent arrhythmias, right heart dilation, pulmonary HTN."}, {"topic": "Pediatric", "q": "Fluid resuscitation in pediatric burns at non-burn centers (age-based)?", "a": "<5 y: 125 mL/hr LR. 6–13 y: 250 mL/hr LR. ≥14 y: 500 mL/hr LR. Infants/young children add LR with 5% dextrose (limited glycogen stores). Shifted away from Parkland at non-burn centers."}, {"topic": "Pediatric", "q": "Pediatric airway differences affecting intubation?", "a": "Large occiput → natural airway flexion (needs neck extension); large floppy epiglottis needs a straight blade. Cricothyroid membrane small (~2.6–3 mm), larynx high in neck."}, {"topic": "Vascular", "q": "Complicated pseudoaneurysm (PSA) criteria — warrants open surgery?", "a": "Hemodynamic instability, motor/sensory deficits, pulse deficits, expanding hematoma, skin/subcutaneous damage, or concern for soft tissue infection."}, {"topic": "Vascular", "q": "Thrombin injection for PSA — indications and failure predictors?", "a": "Uncomplicated PSA ≥3 cm; can repeat. Failure more likely if neck length/diameter >5.5 mm. Small diameters can be observed if asymptomatic/uncomplicated."}, {"topic": "Vascular", "q": "Carotid endarterectomy — clamping and shunt criteria?", "a": "Clamp ICA first (avoid distal embolization), then CCA and ECA. Patch closure superior to primary. Selective shunt if stump pressure <40 mm Hg. Unclamp ECA first, then CCA, then ICA."}, {"topic": "Vascular", "q": "Chronic mesenteric ischemia — demographics, pathophysiology, treatment?", "a": "Women 40–70, postprandial pain, atherosclerosis at ostia; flow-limiting stenosis of ≥2 of 3 mesenteric arteries. Endovascular preferred; revascularizing 1 vessel (celiac or SMA) usually sufficient."}, {"topic": "Vascular", "q": "Nonocclusive mesenteric ischemia — cause and best test in an unstable patient?", "a": "High-dose vasopressors (esp. vasopressin). CT angiogram is diagnostic tool of choice, but in a patient too unstable for CT, bedside duplex ultrasound of the abdomen."}, {"topic": "Vascular", "q": "Popliteal aneurysm — standard repair?", "a": "Most left in situ, bypassed with reversed saphenous vein, ligated proximally/distally. Medial approach; posterior approach for lesions confined to popliteal fossa. Thrombolysis then bypass for acute occlusion with severe ischemia."}, {"topic": "Vascular", "q": "Segmental upper extremity pressures — diagnostic gradients?", "a": "Brachial drop of 10–20 mmHg vs contralateral = brachial/axillary/subclavian/brachiocephalic stenosis. Forearm drop of 20–30 mmHg = obstruction distal to brachial. Finger gradient >15 mmHg or wrist-to-digit >30 mmHg = occlusion distal to palmar arch."}, {"topic": "Vascular", "q": "Ischemic vs hemorrhagic stroke proportion and most significant risk factor?", "a": "~85% ischemic. Carotid disease causes only ~8% of ischemic strokes. Most significant risk factor: uncontrolled hypertension."}, {"topic": "Vascular", "q": "Acute ischemic stroke — tPA window and thrombectomy window?", "a": "IV tPA within 4.5 h of symptom onset. Endovascular thrombectomy within 24 h for anterior circulation (e.g., MCA) occlusion. tPA contraindicated after major surgery."}, {"topic": "Vascular", "q": "Cerebral venous sinus thrombosis — preferred imaging?", "a": "CT venogram (initial, esp. acute). MR venography for select cases (e.g., pediatric radiation avoidance). Suspect in young trauma patients with headache and unexplained decreased consciousness."}, {"topic": "Trauma", "q": "Odontoid fracture types and management?", "a": "Type I (through upper dens): stable, nonoperative. Type II (base of dens): unstable, high nonunion (esp. >50), collar/halo or surgery. Type III (into C2 body): better healing, rarely needs surgery."}, {"topic": "Trauma", "q": "Ureteral injury management by timing?", "a": "Within 5 days: stent, explore, or repair. Found at 10–14 days or later: percutaneous nephrostomy + delayed repair."}, {"topic": "Trauma", "q": "ICP monitoring indications?", "a": "GCS ≤8 with abnormal head CT, OR normal CT with 2 of: age >40, hypotension history, abnormal motor posturing."}, {"topic": "Trauma", "q": "CPP and ICP targets in adult TBI?", "a": "Keep CPP 60–70 mm Hg (Brain Trauma Foundation), ICP <20 mm Hg. CPP <50 → ischemia; >70 → edema/ARDS. Children: CPP 40–50 (≤5 y), 50–60 (>5 y)."}, {"topic": "Trauma", "q": "Autonomic dysreflexia — level, trigger, and management?", "a": "Injuries at/above T6. Triggered by noxious stimulus below injury (often bladder/bowel). BP >150 or 40 above baseline. Sit patient up, remove stimulus, topical nitroglycerin paste (short-acting). Avoid labetalol (rebound hypotension)."}, {"topic": "Trauma", "q": "Spinal Motion Restriction indications in blunt trauma (ACS)?", "a": "(1) Altered consciousness/GCS<15/intoxication; (2) midline neck/back pain or tenderness; (3) focal neuro signs; (4) spinal deformity; (5) distracting injury. NOT indicated for penetrating trauma."}, {"topic": "Trauma", "q": "VTE prophylaxis timing in trauma and after splenic injury?", "a": "Delay >4 days → 3-fold VTE risk. Prophylaxis within 24–48 h reduces VTE. After splenic injury: LMWH within 48 h regardless of grade (within 12 h for lower grades)."}, {"topic": "Trauma", "q": "Forearm compartment syndrome — most susceptible compartment and pressure thresholds?", "a": "Deep volar compartment (most at risk). Normal pressure 8–9 mm Hg. Compartment syndrome if absolute pressure ≥30 mm Hg or within 30 mm Hg of diastolic. Decision primarily on clinical suspicion."}, {"topic": "Trauma", "q": "Denver criteria — what do they screen for?", "a": "Blunt cerebrovascular injury (BCVI). Signs: arterial hemorrhage, cervical bruit (<50), expanding hematoma, focal deficit, stroke on imaging. Risk factors: high-energy mechanism, midface/mandible/complex skull fracture, C-spine injury, near-hanging, seatbelt sign."}, {"topic": "Trauma", "q": "Damage control surgery — predictors/triggers?", "a": "Hypothermia <34°C, pH <7.2, coagulopathy, persistent hypotension. Labs: lactate ≥5 mmol/L, base deficit ≥6 (>55 y) or ≥15 (<55 y)."}, {"topic": "Trauma", "q": "Platelet transfusion thresholds in trauma (2023 European Guideline)?", "a": "Maintain >50,000/mm³ with ongoing bleeding; >100,000/mm³ in TBI. Initial dose 4–8 units or 1 apheresis pack. Spontaneous bleeding risk indication ~10,000/mm³."}, {"topic": "Trauma", "q": "Isolated transverse process fractures — significance?", "a": "Do not confer mechanical instability; rarely require operative treatment or spine consult. High-risk: midline tenderness, palpable step-off, ecchymosis, neuro deficits."}, {"topic": "Trauma", "q": "Tocolytics in pregnant trauma patients — which to avoid and which are safe?", "a": "Avoid terbutaline (tachycardia/hypotension can mask bleeding). Magnesium sulfate, indomethacin safe if no abruption/bleeding. Betamethasone (fetal lung maturity, 24–34 wks) not contraindicated."}, {"topic": "Trauma", "q": "Overwhelming postsplenectomy sepsis — mortality, vaccines, revaccination?", "a": "~50% mortality if unvaccinated. Highest risk first 3 years. Conjugate vaccines (pneumococcus, meningococcus, Hib, influenza) given within 2 weeks of surgery. Meningococcal/pneumococcal boosters every 5 years; Hib none. Ceftriaxone is drug of choice for OPSI."}, {"topic": "Soft Tissue", "q": "Frostbite depth categories?", "a": "Frostnip: surface ice crystals, vasoconstriction, no long-term damage. 2nd degree: partial thickness, clear/milky blisters, heals 2–4 wks. 3rd degree: full thickness, hemorrhagic blisters, black eschar, 1–3 months. 4th degree: to bone, mummified."}, {"topic": "Soft Tissue", "q": "Frostbite rewarming and blister management?", "a": "Treat hypothermia first. Rapid rewarming in 98.6–102.2°F (37–39°C) water until pliable/perfused. Drain milky/clear blisters (remove prostaglandins); leave hemorrhagic blisters intact."}, {"topic": "Soft Tissue", "q": "Dermatofibrosarcoma protuberans — appearance and histology?", "a": "Firm, flesh-colored to dull red plaques; finger-like spindle cell projections account for recurrence."}, {"topic": "Soft Tissue", "q": "Brown recluse spider bite — timeline and management?", "a": "Central blister with peripheral edema/erythema within 6 h; necrotic eschar by 48–72 h. Immobilize, tetanus, wound care, pain control. Cover Clostridium perfringens. Avoid early debridement (worsens venom effect); delayed intervention for stabilized wounds."}, {"topic": "Soft Tissue", "q": "Lightning injury — most urgent assessment and neuro finding?", "a": "ECG to rule out cardiac injury (ventricular arrhythmias predominate). Keraunoparalysis: transient paralysis (lower > upper extremities) from autonomic overstimulation, resolves in hours. >50% get tympanic membrane rupture; cataracts most common ocular complication."}, {"topic": "Soft Tissue", "q": "Heat stroke — definition, types, and mortality?", "a": "Core temp >40°C + hot dry skin + CNS abnormalities. Exertional (healthy, exercising) vs nonexertional (older, comorbid). Mortality 58% at 28 days, 71% at 2 years."}, {"topic": "Soft Tissue", "q": "Mesenteric cyst — cause and treatment?", "a": "Sequestration of lymphatic tissue; twice as common as omental cysts. Surgery indicated for all mesenteric cysts — simple/total excision (limited resection with primary anastomosis if near bowel or possible enteric duplication)."}, {"topic": "Soft Tissue", "q": "Retroperitoneal sarcoma recurrence — liposarcoma vs leiomyosarcoma pattern?", "a": "Liposarcoma recurs locally; leiomyosarcoma recurs with distant metastases. Re-excision offers best survival; prolonged disease-free interval = better prognosis."}, {"topic": "Soft Tissue", "q": "Pilonidal disease — Tezel classification and surgical candidates?", "a": "5 types. Midline pits pathognomonic. Type I: asymptomatic pits (no surgery). Type II: abscess (lateral I&D). Surgery for types III, IV, V. Options: open excision (low recurrence), Karydakis/Bascom, Limberg flap, EPSiT."}, {"topic": "Critical Care", "q": "CVP waveform components?", "a": "a wave = atrial contraction; c wave = tricuspid closure/ventricular systole; x descent = atrial filling; v wave = RA end-diastolic pressure; y descent = tricuspid opening/passive emptying. PA waveform has dicrotic notch (pulmonic valve closure)."}, {"topic": "Critical Care", "q": "Refeeding syndrome pathophysiology?", "a": "Reinstitution of nutrition → insulin drives phosphate intracellularly (and into phosphate-dependent molecules like ATP) → hypophosphatemia → neurologic, cardiac, respiratory, hematologic complications."}, {"topic": "Critical Care", "q": "ASPEN refeeding syndrome severity classification?", "a": "Drop in phosphate, potassium, or magnesium within 5 days of increasing calories: mild 10–20%, moderate 20–30%, severe >30% or organ dysfunction (or thiamine deficiency)."}, {"topic": "Critical Care", "q": "Cardiogenic shock — initial management?", "a": "TTE urgently. Gentle fluid challenge (limit boluses to 500 cc). Optimal pressors: vasopressin (raises SVR without pulmonary VR) and norepinephrine (lower arrhythmia risk). Mechanical support (IABP, Impella, VA ECMO) if refractory."}, {"topic": "Critical Care", "q": "Normal SvO2 and what decreased SvO2 indicates?", "a": "≥75%. Decreased SvO2 = increased tissue O2 extraction, seen in all shock types EXCEPT distributive (septic/anaphylactic), where extraction is impaired."}, {"topic": "Critical Care", "q": "Anaphylaxis epinephrine dosing?", "a": "IM: 0.01 mg/kg, or 0.3 mg (1:1000) if weight unknown, repeat at 15 min. IV: 0.05 mg (1:10,000), repeat at 15 min."}, {"topic": "Critical Care", "q": "Serotonin syndrome — triad and treatment?", "a": "Altered mental status, autonomic hyperactivity (tachycardia, HTN, hyperthermia), neuromuscular abnormalities (tremor, hyperreflexia, clonus). Stop offending drug + supportive care; cyproheptadine for severe cases."}, {"topic": "Critical Care", "q": "Sick euthyroid syndrome (NTIS) labs?", "a": "Low free T3 and T4 with mildly elevated reverse T3 and no compensatory TSH rise. T3 inversely correlates with illness severity."}, {"topic": "Critical Care", "q": "Atrial fibrillation rate control by EF (2023 guideline)?", "a": "Target resting HR 100–110. EF >40% and stable: beta-blockers or non-dihydropyridine CCBs (verapamil, diltiazem). Heart failure/EF <40%: IV amiodarone."}, {"topic": "Critical Care", "q": "NIPPV benefits in cardiogenic pulmonary edema?", "a": "Improved oxygenation/recruitment, increased functional residual capacity, reduced LV afterload, improved RA preload. Reduces hospital mortality and need for intubation."}, {"topic": "Critical Care", "q": "Early vs standard RRT in AKI — evidence?", "a": "Early RRT → more hypotension, more RRT-associated infections, and sustained dependence (higher continued need at 90 days)."}, {"topic": "Critical Care", "q": "VV-ECMO criteria for severe ARDS (EOLIA)?", "a": "P:F <50 for 3 h, P:F <80 for 6 h, or pH <7.25 with pCO2 >60 for 6 h; intubation <7 days. Same for COVID and non-COVID ARDS."}, {"topic": "Nutrition", "q": "Short gut syndrome — causes and what's tolerable?", "a": "~75% from small bowel resection, 25% multiple resections (Crohn); neonates: NEC. Resection up to 70% tolerated if terminal ileum and ileocecal valve preserved. Proximal resections tolerated better. Terminal ileum absorbs B12 and bile salts."}, {"topic": "Nutrition", "q": "Adjuncts in short gut syndrome to prevent gut atrophy?", "a": "GLP-2 (mucosal growth), neurotensin, bombesin. Others: H2/PPI, antibiotics for overgrowth, ursodiol, cholestyramine, octreotide, loperamide. Supplement MCTs and fat-soluble vitamins (A,D,E,K), Ca, Mg, Zn."}, {"topic": "Nutrition", "q": "Daily GI fluid load and absorption?", "a": "~9 L/day (oral 2000, saliva 1500, stomach 1000–2000, biliary 500, pancreatic 1500, small bowel 1500). Absorption: small bowel 8500 mL, large bowel 400 mL."}, {"topic": "Nutrition", "q": "Vitamin deficiency syndromes (A, C, D, E, K)?", "a": "A: night blindness, xerophthalmia. C: scurvy. D: rickets/osteomalacia. E: peripheral neuropathy, ataxia, hemolytic anemia. K: elevated INR, easy bruising, bleeding."}, {"topic": "Nutrition", "q": "Magnesium deficiency effects?", "a": "Neuromuscular hyperexcitability, delirium; widened QRS/peaked T waves then arrhythmias; insulin resistance; hypokalemia; hypocalcemia. Causes refractory hypokalemia and hypocalcemia."}, {"topic": "Nutrition", "q": "Chylous ascites — cause, diagnosis, treatment?", "a": "Adults: lymphatic obstruction at mesentery base (most commonly lymphoma) or surgical trauma. Milky fluid, triglycerides >110 mg/dL (or 2x plasma), lymphocytic. Treat: high-protein low-fat diet or TPN ± somatostatin."}, {"topic": "Nutrition", "q": "Chylothorax — diagnosis and management by volume?", "a": "Milky pleural fluid, triglycerides >110 mg/dL. Low volume (<1.5 L/day): low-fat diet, somatostatin, drainage. Failure: TPN, then pleurodesis (~80% success), esp. cancer-related."}, {"topic": "Nutrition", "q": "Thiamine deficiency — presentation and treatment?", "a": "Fatigue, poor memory, confusion, ataxia, diminished reflexes. Treat with 200 mg IV/PO TID until improvement. Wernicke-Korsakoff (gait, mental status, ocular): 500 mg TID x48 h, then 250 mg x72 h."}, {"topic": "Nutrition", "q": "EFFORT Protein trial finding?", "a": "High-protein (≥2.2 g/kg/day) vs normal (≤1.2) in critically ill: no mortality benefit; HARMFUL in sicker patients with AKI/high SOFA. Current guidelines recommend lower protein (~1.2–1.3 g/kg/day)."}, {"topic": "Nutrition", "q": "GLIM criteria for malnutrition?", "a": "3-step: (1) validated screening; (2) ≥1 phenotypic (weight loss, low BMI, reduced muscle mass) + ≥1 etiologic criterion; (3) severity by phenotypic thresholds."}, {"topic": "Nutrition", "q": "Albumin/prealbumin as nutritional markers — caveat?", "a": "Negative acute-phase reactants, downregulated in stress/critical illness (with rising CRP). CRP/albumin ratio predicts postop complications in malignancy independent of nutrition."}, {"topic": "Nutrition", "q": "Hypophosphatemia consequences?", "a": "Respiratory muscle dysfunction → respiratory failure; decreased myocardial contractility/arrhythmias; decreased 2,3-DPG → increased Hgb-O2 affinity → tissue hypoxia."}, {"topic": "Renal", "q": "AKI diagnostic criteria (AKIN)?", "a": "SCr increase ≥0.3 mg/dL within 48 h, OR SCr ≥1.5x baseline within 7 days, OR urine output <0.5 mL/kg/hr for 6 h."}, {"topic": "Renal", "q": "Acute hyponatremia management?", "a": "Aggressive treatment if rapid/severe symptoms. Increase Na by 4–6 mEq/L (small volumes of 3% saline) to reverse severe symptoms. Max correction <8 mEq/L/day to avoid osmotic demyelination (central pontine myelinolysis)."}, {"topic": "Renal", "q": "Chronic hyponatremia management by volume status?", "a": "Hypovolemic: 0.9% saline. Euvolemic (SIADH): free water restriction + solute. Hypervolemic: fluid restriction + loop diuretics."}, {"topic": "Renal", "q": "Sodium correction for hyperglycemia?", "a": "Add 1.6 mEq/L to measured Na for every 100 mg/dL glucose above 100. Severe hyperglycemia (>200) with maxed glucose reabsorption causes glycosuria/free water loss → can precipitate hypernatremia if no oral intake."}, {"topic": "Renal", "q": "Free water deficit formula?", "a": "FWD = Total Body Water × ((Current Na / Ideal Na) − 1); TBW = lean body weight × 0.6 (men) or 0.5 (women)."}, {"topic": "Renal", "q": "For acute change in pCO2 of 10, how much does pH change?", "a": "pH changes by 0.08."}, {"topic": "Pharmacology", "q": "Amphotericin B mechanism and toxicity?", "a": "Binds fungal membrane sterols → lysis. Dose-related nephrotoxicity; liposomal preparations allow 3–5x higher doses with less nephrotoxicity."}, {"topic": "Pharmacology", "q": "Azoles vs echinocandins mechanism?", "a": "Azoles inhibit fungal sterol synthesis. Echinocandins (anidulafungin, micafungin, caspofungin) inhibit fungal cell wall synthesis; active against Candida (incl. azole-resistant) and many Aspergillus."}, {"topic": "Pharmacology", "q": "Antifungal for intra-abdominal Candida vs Aspergillus (IDSA)?", "a": "Candida (upper GI flora): echinocandin (caspofungin/micafungin); fluconazole alternative if not critically ill (not for C. glabrata). Aspergillus: voriconazole first-line."}, {"topic": "Pharmacology", "q": "Platelet activation pathways and matching drugs?", "a": "ADP receptor (clopidogrel, prasugrel, ticagrelor), TXA2 (aspirin — irreversible COX-1 inhibition), GP IIb/IIIa (eptifibatide, tirofiban, abciximab). Ticagrelor reversibly binds P2Y12."}, {"topic": "Pharmacology", "q": "Succinylcholine — mechanism, metabolism, contraindications?", "a": "Depolarizing nicotinic ACh agonist; fasciculations then paralysis. Metabolized by plasma cholinesterase. Contraindicated in neuromuscular disease, closed-head injury, burns (hyperkalemia). Malignant hyperthermia (RYR1) → treat with dantrolene."}, {"topic": "Pharmacology", "q": "Why is succinylcholine contraindicated 5 days after burns/crush injury?", "a": "Upregulation of ACh receptors (begins ~24 h post-injury, persists weeks-months) → life-threatening hyperkalemia. Use rocuronium (nondepolarizing, reversible with sugammadex) instead."}, {"topic": "Pharmacology", "q": "Nondepolarizing NMBA onset times and RSI choice?", "a": "Cisatracurium ~150 s, vecuronium ~180 s (too slow for RSI). Rocuronium 60–90 s — reliable RSI alternative to succinylcholine (2023 SCCM guideline)."}, {"topic": "Pharmacology", "q": "Relative potency of glucocorticoids?", "a": "Hydrocortisone 1, prednisone 4, methylprednisolone 5, dexamethasone 30. Long-acting: betamethasone, dexamethasone."}, {"topic": "Pharmacology", "q": "PAMORAs — name three and their uses?", "a": "Methylnaltrexone (opioid-induced constipation, noncancer pain), alvimopan (prevent postop ileus — must give pre-emptively, not for established ileus), naloxegol (opioid-induced constipation, oral)."}, {"topic": "Pharmacology", "q": "Methadone pharmacology and advantages?", "a": "Long-acting opioid, half-life 13–50 h. Reduces postop opioid use, earlier ventilator liberation. Lower abuse potential, less sedation than morphine. Prolongs QT; delayed/prolonged peak respiratory depression."}, {"topic": "Pharmacology", "q": "GLP-1 agonists — perioperative holding (ASA)?", "a": "Hold on day of surgery for once-daily dosing; hold 1 week before for once-weekly dosing (delayed gastric emptying)."}, {"topic": "Pharmacology", "q": "Apixaban perioperative holding?", "a": "48 h (skip 4 doses) before high-bleed-risk; 24 h before low-moderate risk. Longer with renal impairment (72 h moderate, 96 h severe). No routine heparin bridging for DOACs (2022 CHEST)."}, {"topic": "Pharmacology", "q": "When is heparin bridging recommended?", "a": "Atrial fibrillation with recent stroke/TIA, or mechanical valve. Against bridging for most DOAC interruptions."}, {"topic": "Pharmacology", "q": "RASIs (ACE-I/ARB) before elective surgery?", "a": "Many guidelines recommend stopping before surgery — withholding reduces intraoperative hypotension."}, {"topic": "Pharmacology", "q": "Sugammadex vs neostigmine for NMBA reversal?", "a": "Sugammadex encapsulates rocuronium/vecuronium (reverses deep block). Neostigmine (acetylcholinesterase inhibitor) reverses only mild-moderate block; both risk bradycardia/bronchospasm (less with sugammadex)."}, {"topic": "Thoracic", "q": "Thymoma — most common location, malignancy, and associated syndrome?", "a": "Most common anterosuperior mediastinal neoplasm, peaks 3rd–5th decades. ~50% malignant (tend to be >3–5 cm). Myasthenia gravis in 20–25% of thymoma patients; only 10–20% of MG patients have thymoma."}, {"topic": "Thoracic", "q": "Thymoma treatment?", "a": "Complete resection with negative margins is cornerstone. Adjuvant radiation for capsular invasion/positive margins. Chemo for advanced/unresectable/metastatic."}, {"topic": "Thoracic", "q": "Pancoast tumor — structures invaded and syndromes?", "a": "Invades thoracic inlet (1st rib, brachial plexus, subclavian vessels, upper thoracic vertebrae, sympathetic chain). Shoulder/arm pain; Horner syndrome (ptosis, miosis, anhidrosis) or SVC syndrome."}, {"topic": "Thoracic", "q": "Pancoast tumor treatment?", "a": "Concurrent chemoradiation (cisplatin/etoposide + 45 Gy) then resection (lobectomy + involved structures). ~90% R0 resection, ~50% complete pathologic response, ~55% 5-year survival."}, {"topic": "Thoracic", "q": "Preoperative pulmonary evaluation for lung resection?", "a": "FEV1 & DLCO: >60% predicted → proceed. 40–60% → V/Q scan for ppoFEV1/ppoDLCO. ppo >40% → safe for lobectomy; ppo <40% → VO2 max (>15 mL/kg/min acceptable, <10 prohibitive)."}, {"topic": "Thoracic", "q": "Empyema management progression?", "a": "Pigtail catheter (least invasive, insufficient for purulent). Tube thoracostomy + intrapleural tPA/DNase (MIST-2 trial: combination superior). VATS decortication if organized/failed less invasive treatment."}, {"topic": "Thoracic", "q": "Squamous cell lung cancer — proportion and paraneoplastic syndrome?", "a": "~22% of lung cancers; associated with PTH-related peptide paraneoplastic syndrome (hypercalcemia)."}, {"topic": "Small Bowel", "q": "Small intestine adenoma types and malignancy risk?", "a": "Villous, true, and Brunner gland. Distribution: 20% duodenum, 30% jejunum, 50% ileum. Villous highest malignancy risk (35–55%), often >5 cm, associated with FAP. Brunner gland: benign, no malignant potential."}, {"topic": "Small Bowel", "q": "Small bowel diverticula (non-Meckel) — characteristics?", "a": "Incidence 0.2–4.5%, older patients, often incidental. Acquired pseudodiverticula (mucosa + submucosa only), distinct from Meckel. Asymptomatic — no treatment needed."}, {"topic": "Small Bowel", "q": "EBV-associated malignancies?", "a": "Burkitt lymphoma, Hodgkin lymphoma, immunosuppression-related lymphoma, nasopharyngeal carcinoma, subset of gastric cancers (~10% worldwide). PTLD is EBV-positive B-cell proliferation."}, {"topic": "Small Bowel", "q": "EBV-associated gastric cancer features?", "a": "DNA promoter methylation silencing genes; male predominance, cardia/gastric stump location, lymphocytic infiltration, less lymph node metastasis, better prognosis."}, {"topic": "Small Bowel", "q": "Aspiration pneumonitis vs pneumonia — antibiotics?", "a": "Withhold empiric antibiotics in mild-moderate cases; reassess at 48 h. Empiric IV antibiotics if severe (shock/intubation). Quantitative BAL cultures for intubated patients distinguish infection from chemical pneumonitis."}, {"topic": "Hematology", "q": "Factor V Leiden — mechanism and management?", "a": "Most common inherited hypercoagulable disorder; defective factor V can't be inactivated by activated protein C. Venous thrombosis in young patients; lifelong anticoagulation. Higher risk in homozygotes."}, {"topic": "Hematology", "q": "Other inherited thrombophilias?", "a": "Prothrombin G20210A, protein C deficiency, protein S deficiency, antithrombin deficiency."}, {"topic": "Hematology", "q": "Von Willebrand disease — subtypes with GI and joint bleeding?", "a": "GI bleeding (often angiodysplasia): types 2A and 3. Joint bleeding: 50% of type 3, 5–10% type 1/2 (correlates with Factor VIII level)."}, {"topic": "Hematology", "q": "DDAVP in VWD — mechanism and contraindication?", "a": "Releases VWF stores from endothelial cells. Contraindicated in type 2B (causes thrombocytopenia). Trial recommended to assess pharmacokinetic response."}, {"topic": "Hematology", "q": "Tranexamic acid in VWD — mechanism and caution?", "a": "Inhibits fibrinolysis (binds plasminogen lysine sites). Avoid with significant hematuria (clot colic/obstruction). Dose 15–25 mg/kg PO TID."}, {"topic": "Hematology", "q": "Platelet transfusion threshold with no active bleeding/procedure?", "a": ">50,000/mm³ generally sufficient; spontaneous bleeding indication ~10,000/mm³."}, {"topic": "OB/Gyn", "q": "Ectopic pregnancy — 3 management approaches and MTX criteria?", "a": "Surgery (salpingostomy/salpingectomy), MTX, expectant. MTX: hemodynamically stable, beta-hCG ≤5000 IU/mL, no fetal cardiac activity, willing to follow up."}, {"topic": "OB/Gyn", "q": "Ovarian torsion — diagnosis and management?", "a": "US: enlargement, edema, peripherally displaced follicles, whirlpool sign (coiled pedicle). Doppler flow doesn't rule out torsion. Urgent laparoscopy + detorsion; favor conservation over oophorectomy even if dusky."}, {"topic": "OB/Gyn", "q": "Ovarian torsion — malignancy risk and size threshold?", "a": "~2% malignancy risk in adults; size >8 cm associated with malignancy. If detorsion elected, ultrasound in 3 months."}, {"topic": "OB/Gyn", "q": "Septic pelvic thrombophlebitis — presentation and best diagnostic test?", "a": "First 2–4 days postpartum: fever, tachycardia, pain radiating to groin, rope-like mass. Response to systemic heparin trial is best diagnosis. Treat 7–10 days heparin + broad-spectrum antibiotics."}, {"topic": "Infectious Disease", "q": "Most common ICU pneumonia pathogens?", "a": "Most common gram-negative: Pseudomonas aeruginosa (then Acinetobacter). Most common gram-positive: Staphylococcus aureus."}, {"topic": "Infectious Disease", "q": "Burn wound infection — risk factors and diagnosis?", "a": "Infections are leading cause of burn mortality. Risk: TBSA >20%, delayed excision, older/immunocompromised. Diagnosis relies on wound culture, tissue biopsy, histopathology. Prophylactic antibiotics contraindicated (promote gram-negative/fungal)."}, {"topic": "Infectious Disease", "q": "Dexamethasone in COVID-19 (NIH guidelines)?", "a": "For all hospitalized patients requiring oxygen/HFNC/NIV/mechanical ventilation/ECMO (lowers 28-day mortality). Add baricitinib (oral) or tocilizumab (IV) if no second immunomodulator given."}, {"topic": "Infectious Disease", "q": "Skin prep agent of choice (2023 multisociety)?", "a": "Alcohol-containing prep + antiseptic; chlorhexidine/alcohol over povidone-iodine-alcohol (longer residual, works in blood/serum). Povidone-iodine-alcohol if chlorhexidine allergy."}, {"topic": "Infectious Disease", "q": "Triclosan-coated sutures and dual-ring wound protectors — SSI evidence?", "a": "Antiseptic (triclosan)-coated sutures reduce SSI in colorectal surgery (2023 guideline, moderate evidence). Dual-ring wound protectors reduce SSI more than single-ring."}, {"topic": "Infectious Disease", "q": "Honey for wound infections?", "a": "Reduces biofilm formation; low resistance risk due to multiple antimicrobial mechanisms."}, {"topic": "Statistics", "q": "Power of a study?", "a": "1 − β, where β = probability of incorrectly accepting the null hypothesis (Type II error)."}, {"topic": "Statistics", "q": "Wells score for PE — probability cutoffs?", "a": "Low 0–1, intermediate 2–6, high >7. Variables include prior DVT/PE (1.5), recent surgery/immobilization (1.5), cancer (1), hemoptysis (1), HR>100 (1.5), signs of DVT (3), PE most likely (3)."}, {"topic": "General", "q": "Hashimoto thyroiditis — when is surgery indicated?", "a": "Reserved for large goiters, compressive symptoms, symptoms refractory to LT4, or inability to rule out malignancy (nodules/rapid growth). Most managed with LT4 alone."}, {"topic": "General", "q": "PTLD — cell type of origin?", "a": "Proliferation of EBV-positive B-cells (not T-cells)."}, {"topic": "General", "q": "Cannabis use — perioperative effects?", "a": "Increased bronchial reactivity, higher CVA/MI risk; decreased intraop vasopressor/fluid needs; increased postop opioid requirements and pain scores."}, {"topic": "General", "q": "Smoking cessation before surgery — optimal timing?", "a": "At least 6 weeks (more benefit >8 weeks). Smoking on day of surgery increases SSI risk. Mucociliary clearance improves after a few weeks."}, {"topic": "General", "q": "Abdominal fascial dehiscence — risk factors (2022 review)?", "a": "High BMI, smoking, emergency operation, surgical site/wound infection."}, {"topic": "General", "q": "Immunonutrition (arginine, omega-3, ribonucleotides) — ESPEN 2021?", "a": "Peri/postoperative enriched formula for malnourished patients undergoing major cancer surgery. No clear evidence for sole use vs standard supplements preoperatively."}, {"topic": "General", "q": "Lymphadenopathy after vaccination — imaging guidance?", "a": "Wait ≥6 weeks after vaccination to image head/neck malignancies; don't biopsy reactive nodes unless suspicious features (microcalcifications, irregular borders) or high clinical concern."}, {"topic": "General", "q": "Brain death exam — sedative clearance requirement?", "a": "Wait ≥5 half-lives for CNS depressants; blood alcohol <0.08%. Pentobarbital must be <5 µg/mL (half-life 20–22 h, ~5 days if levels unavailable)."}, {"topic": "General", "q": "Brain death exam on ECMO — BP targets?", "a": "Same principles + apnea test. Adults/VV-ECMO: SBP ≥100, MAP ≥75. VA-ECMO: MAP ≥75. Pediatric: 24–48 h observation, SBP/MAP at least 5th percentile for age."}, {"topic": "General", "q": "Acute cholecystitis in high-risk patients — safe cholecystectomy window (WSES 2020)?", "a": "Within 10 days of symptom onset and within 7 days of admission for moderate-severe cholecystitis in high (not prohibitive) risk patients."}, {"topic": "General", "q": "Primary vs secondary hypothermia?", "a": "Primary: prolonged cold exposure overwhelms heat generation. Secondary: normal metabolic responses impaired by illness or substance abuse."}];
const KEY = "abs_qe_progress_v1";
const store = {
  get(){ try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e){ return {}; } },
  set(v){ try { localStorage.setItem(KEY, JSON.stringify(v)); } catch(e){} }
};
let known = store.get();
let order = [], pos = 0, flipped = false, dueOnly = false;
const cid = c => c.topic + "|" + c.q.slice(0,40);
const $ = id => document.getElementById(id);

function topics(){
  const set = [...new Set(CARDS.map(c=>c.topic))].sort();
  $("topic").innerHTML = '<option value="__all">All topics ('+CARDS.length+')</option>' +
    set.map(t=>{const n=CARDS.filter(c=>c.topic===t).length;return `<option value="${t}">${t} (${n})</option>`}).join("");
}
function pool(){
  const t=$("topic").value;
  return CARDS.filter(c => (t==="__all"||c.topic===t) && (!dueOnly || !known[cid(c)]));
}
function build(shuffle){
  order = pool();
  if(shuffle){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} }
  pos=0; flipped=false; render();
}
function stats(){
  const t=$("topic").value;
  const s=CARDS.filter(c=>t==="__all"||c.topic===t);
  const k=s.filter(c=>known[cid(c)]).length;
  $("stats").innerHTML=`<span><b>${k}</b> known</span><span><b>${s.length-k}</b> left</span><span><b>${s.length}</b> total</span>`;
}
function render(){
  stats();
  const empty = order.length===0 || pos>=order.length;
  $("card").classList.toggle("hidden", empty);
  $("done").classList.toggle("hidden", !empty);
  $("counter").classList.toggle("hidden", empty);
  $("frontActions").classList.toggle("hidden", empty);
  $("gradeActions").classList.add("hidden");
  if(empty) return;
  const c=order[pos];
  $("c-topic").textContent=c.topic + (known[cid(c)]?"  ✓":"");
  $("c-q").textContent=c.q;
  $("c-a").textContent=c.a;
  $("counter").textContent=(pos+1)+" / "+order.length;
  flipped=false;
  $("answerBlock").classList.add("hidden");
  $("hint").classList.remove("hidden");
  $("frontActions").classList.remove("hidden");
  $("gradeActions").classList.add("hidden");
}
function flip(){
  if(order.length===0||pos>=order.length||flipped) return;
  flipped=true;
  $("answerBlock").classList.remove("hidden");
  $("hint").classList.add("hidden");
  $("frontActions").classList.add("hidden");
  $("gradeActions").classList.remove("hidden");
  $("card").scrollTop = $("card").scrollHeight;
}
function grade(k){
  const c=order[pos];
  if(k) known[cid(c)]=true; else delete known[cid(c)];
  store.set(known);
  next();
}
function next(){ if(pos<order.length){pos++;} render(); }
function prev(){ if(pos>0){pos--; render();} }

$("revealBtn").onclick=flip;
$("card").addEventListener("click", ()=>{ if(!flipped) flip(); });
$("knowBtn").onclick=()=>grade(true);
$("againBtn").onclick=()=>grade(false);
$("shuffle").onclick=()=>build(true);
$("restart").onclick=()=>build(false);
$("topic").onchange=()=>build(false);
$("dueBtn").onclick=()=>{ dueOnly=!dueOnly; $("dueBtn").textContent=dueOnly?"Review":"All"; build(false); };

// swipe navigation
let sx=0, sy=0, moved=false;
const stage=document.querySelector(".stage");
stage.addEventListener("touchstart",e=>{sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;},{passive:true});
stage.addEventListener("touchmove",e=>{ if(Math.abs(e.touches[0].clientX-sx)>10) moved=true; },{passive:true});
stage.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(moved && Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.4){ dx<0?next():prev(); }
});

topics(); build(false);
</script>
</body>
</html>
